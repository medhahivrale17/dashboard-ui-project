<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<link rel="stylesheet" href="../styles/style.css">
<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    width:300px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password">
</div>

<button>Login</button>

</div>

</body>
</html>
