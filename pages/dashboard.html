<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="../styles/style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

/* Layout */
.container{
display:flex;
height:100vh;
}

/* Sidebar */
.sidebar{
width:200px;
background:#2c3e50;
color:white;
padding:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
padding:10px;
margin:10px 0;
cursor:pointer;
}

.sidebar ul li:hover{
background:#34495e;
}

/* Main area */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* Top bar */
.topbar{
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* Content section */
.content{
padding:20px;
}

/* Cards */
.cards{
display:flex;
gap:20px;
}

.card{
background:white;
padding:20px;
flex:1;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>Dashboard</h2>
<ul>
<li>Home</li>
<li>Records</li>
<li>Settings</li>
<li>Logout</li>
</ul>
</div>

<!-- Main Section -->
<div class="main">

<!-- Top Bar -->
<div class="topbar">
<h3>Admin Panel</h3>
</div>

<!-- Content -->
<div class="content">

<h2>Welcome to the Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Users</h3>
<p>120</p>
</div>

<div class="card">
<h3>Sales</h3>
<p>₹25,000</p>
</div>

<div class="card">
<h3>Orders</h3>
<p>75</p>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
